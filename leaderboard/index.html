<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>ZNE Leaderboard</title>
    <meta name='description' content='View ZNE command leaderboard stats'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #121218;
            --bg-tertiary: #1a1a22;
            --accent: #971DFB;
            --accent-hover: #971DFB;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a35;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 20px;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1180px;
            margin: 0 auto;
            padding: 15px 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent), #971DFB);
            font-weight: 800;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-back:hover {
            color: var(--text-primary);
        }

        .page-header {
            text-align: center;
            padding: 60px 0 32px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 7px 13px;
            border: 1px solid rgba(151, 29, 251, 0.35);
            border-radius: 999px;
            background: rgba(151, 29, 251, 0.08);
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(38px, 7vw, 64px);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2px;
            margin-bottom: 12px;
        }

        .gradient {
            background: linear-gradient(135deg, var(--accent), #971DFB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            max-width: 650px;
            margin: 0 auto;
            color: var(--text-secondary);
            font-size: 18px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 28px auto 36px;
        }

        .summary-card {
            padding: 22px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--bg-secondary);
            text-align: center;
        }

        .summary-value {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-size: 30px;
            font-weight: 800;
        }

        .summary-label {
            margin-top: 5px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .leaderboard {
            display: grid;
            gap: 16px;
            margin-bottom: 60px;
        }

        .user-card {
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--bg-secondary);
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .user-card:hover {
            border-color: rgba(151, 29, 251, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
        }

        .user-main {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 18px;
            align-items: center;
            width: 100%;
            padding: 22px;
            border: none;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            font: inherit;
        }

        .rank {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(151, 29, 251, 0.12);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 800;
        }

        .identity {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .avatar {
            width: 56px;
            height: 56px;
            flex: 0 0 auto;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(151, 29, 251, 0.45);
            background: linear-gradient(135deg, var(--accent), #6b5bff);
        }

        .names {
            min-width: 0;
        }

        .display-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 800;
            font-size: 18px;
        }

        .username {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 2px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .score {
            text-align: right;
        }

        .total {
            font-family: 'JetBrains Mono', monospace;
            color: var(--success);
            font-size: 28px;
            font-weight: 900;
        }

        .label {
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .chevron {
            color: var(--text-secondary);
            transition: transform 0.2s;
        }

        .user-card.open .chevron {
            transform: rotate(180deg);
        }

        .commands-panel {
            display: none;
            padding: 0 22px 22px 82px;
        }

        .user-card.open .commands-panel {
            display: block;
        }

        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            padding-top: 18px;
        }

        .command-pill {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .command-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-primary);
        }

        .command-count {
            color: var(--accent);
            font-weight: 800;
        }

        .loading,
        .empty,
        .error {
            padding: 48px 20px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--bg-secondary);
            text-align: center;
            color: var(--text-secondary);
        }

        .error {
            border-color: rgba(255, 71, 87, 0.45);
            color: #ff8b96;
        }

        footer {
            padding: 40px 0 30px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            text-align: center;
            font-size: 13px;
        }

        @media (max-width: 760px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }

            .user-main {
                grid-template-columns: auto 1fr;
            }

            .score {
                grid-column: 1 / -1;
                text-align: left;
            }

            .commands-panel {
                padding-left: 22px;
            }

            .nav-back span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class='nav-content'>
            <a href='/' class='logo'>
                <div class='logo-icon'>Z</div>
                <span class='logo-text'>ZNE</span>
            </a>
            <a href='/' class='nav-back'>
                <i class='fas fa-arrow-left'></i>
                <span>Back to Main Site</span>
            </a>
        </div>
    </nav>

    <main class='container'>
        <section class='page-header'>
            <div class='badge'><i class='fas fa-trophy'></i> Raider Bot</div>
            <h1><span class='gradient'>Leaderboard</span></h1>
            <p>See who has used the most ZNE commands. Open a user to view every command they have run.</p>
        </section>

        <section class='summary-grid'>
            <div class='summary-card'>
                <div class='summary-value' id='totalUsers'>0</div>
                <div class='summary-label'>Users</div>
            </div>
            <div class='summary-card'>
                <div class='summary-value' id='totalCommands'>0</div>
                <div class='summary-label'>Total Commands</div>
            </div>
            <div class='summary-card'>
                <div class='summary-value' id='topUser'>—</div>
                <div class='summary-label'>Top User</div>
            </div>
        </section>

        <section id='leaderboard' class='leaderboard'>
            <div class='loading'><i class='fas fa-circle-notch fa-spin'></i> Loading leaderboard...</div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ZNE Development Team. All rights reserved.</p>
    </footer>

    <script>
        const API_ENDPOINT = '/api/leaderboard';
        const leaderboardEl = document.getElementById('leaderboard');

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll('\'', '&#039;');
        }

        function formatNumber(value) {
            return Number(value || 0).toLocaleString();
        }

        function getDefaultAvatar(user) {
            return user.avatar_url || 'https://cdn.discordapp.com/embed/avatars/0.png';
        }

        function renderCommandPills(commands) {
            const entries = Object.entries(commands || {});
            if (!entries.length) {
                return '<div class=\'empty\'>No command history available for this user yet.</div>';
            }

            entries.sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

            return '<div class=\'commands-grid\'>' + entries.map(([name, count]) => (
                '<div class=\'command-pill\'>' +
                    '<span class=\'command-name\'>' + escapeHtml(name) + '</span>' +
                    '<span class=\'command-count\'>x' + escapeHtml(count) + '</span>' +
                '</div>'
            )).join('') + '</div>';
        }

        function renderLeaderboard(data) {
            const users = Array.isArray(data?.users) ? data.users : [];

            document.getElementById('totalUsers').textContent = formatNumber(users.length);
            document.getElementById('totalCommands').textContent = formatNumber(data?.global_total_commands || users.reduce((sum, user) => sum + Number(user.total_commands || 0), 0));
            document.getElementById('topUser').textContent = users[0] ? users[0].display_name || users[0].username : '—';

            if (!users.length) {
                leaderboardEl.innerHTML = '<div class=\'empty\'>No leaderboard data yet. The bot will publish stats after startup.</div>';
                return;
            }

            leaderboardEl.innerHTML = users.map(user => {
                const displayName = escapeHtml(user.display_name || user.username || user.userid);
                const username = escapeHtml(user.username || user.userid);
                const avatar = escapeHtml(getDefaultAvatar(user));
                const rank = Number(user.rank || 0);
                const total = Number(user.total_commands || 0);

                return '<article class=\'user-card\' data-userid=\'' + escapeHtml(user.userid) + '\'>' +
                    '<button class=\'user-main\' type=\'button\' aria-expanded=\'false\'>' +
                        '<div class=\'rank\'>#' + escapeHtml(rank || '—') + '</div>' +
                        '<div class=\'identity\'>' +
                            '<img class=\'avatar\' src=\'' + avatar + '\' alt=\'\' loading=\'lazy\'>' +
                            '<div class=\'names\'>' +
                                '<div class=\'display-name\'>' + displayName + '</div>' +
                                '<div class=\'username\'>' + username + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class=\'score\'>' +
                            '<div class=\'total\'>x' + escapeHtml(total) + '</div>' +
                            '<div class=\'label\'>commands</div>' +
                        '</div>' +
                    '</button>' +
                    '<div class=\'commands-panel\'>' + renderCommandPills(user.commands || {}) + '</div>' +
                '</article>';
            }).join('');

            leaderboardEl.querySelectorAll('.user-card').forEach(card => {
                const button = card.querySelector('.user-main');
                button.addEventListener('click', () => {
                    const isOpen = card.classList.toggle('open');
                    button.setAttribute('aria-expanded', String(isOpen));
                });
            });
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch(API_ENDPOINT, { cache: 'no-store' });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                renderLeaderboard(data);
            } catch (error) {
                console.error(error);
                leaderboardEl.innerHTML = '<div class=\'error\'>Failed to load leaderboard data. Please try again later.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadLeaderboard);
    </script>
</body>
</html>
