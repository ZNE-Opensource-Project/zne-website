<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZNE Commands</title>
    <meta name="description" content="View ZNE command list">

    <!-- Open Graph / Discord Embed -->
    <meta property="og:title" content="ZNE Commands">
    <meta property="og:description" content="View ZNE command list">
    <meta property="og:url" content="https://zne-website.vercel.app/commands">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ZNE">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="ZNE Commands">
    <meta name="twitter:description" content="View ZNE command list">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #121218;
            --bg-tertiary: #1a1a22;
            --accent: #ff2d55;
            --accent-hover: #ff4d6d;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a35;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navbar */
        nav {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .nav-back {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-back:hover {
            color: var(--text-primary);
        }

        /* Header */
        .page-header {
            text-align: center;
            padding: 50px 0 30px;
        }

        .page-header h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .page-header .gradient {
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* Search */
        .search-bar {
            margin-bottom: 30px;
            position: relative;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-bar input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px 14px 50px;
            color: var(--text-primary);
            font-size: 16px;
        }

        .search-bar i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* Category Sections */
        .category {
            margin-bottom: 40px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .category-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .category-header .count {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        /* Command Cards */
        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 14px;
        }

        .command-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            transition: all 0.2s;
        }

        .command-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .command-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .command-name::before {
            content: ".";
            color: #666;
        }

        .command-desc {
            color: var(--text-secondary);
            font-size: 14.5px;
            line-height: 1.5;
        }

        /* Loading & Empty */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 0 30px;
            color: var(--text-secondary);
            font-size: 13px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        .bot-badge {
            display: inline-block;
            background: rgba(255, 45, 85, 0.15);
            color: var(--accent);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <div class="nav-content">
            <a href="../index.html" class="logo">
                <div class="logo-icon">Z</div>
                <span class="logo-text">ZNE</span>
            </a>
            <a href="../index.html" class="nav-back">
                <i class="fas fa-arrow-left"></i>
                Back to Main Site
            </a>
        </div>
    </nav>

    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <div class="bot-badge"><i class="fas fa-rocket"></i> RAIDER BOT</div>
            <h1><span class="gradient">Raider</span> Commands</h1>
            <p>All available commands for the ZNE Raider bot</p>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search commands..." onkeyup="filterCommands()">
        </div>

        <!-- Commands Container -->
        <div id="commandsContainer">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading commands...
            </div>
        </div>
    </div>

    <footer>
        <p>ZNE Raider Commands • Live from API (powered by Vercel KV)</p>
    </footer>

    <script>
        let allCommands = [];
        let groupedCommands = {};

        // Ultimate hardcoded fallback (only used if both API and KV are unavailable)
        const FALLBACK_DATA = {
            "commands": [
                {"name": "ra1d", "description": "[deprecated] self explanatory.", "category": "Raiding"},
                {"name": "interaction-ra1d", "description": "interaction raiding.", "category": "Raiding"},
                {"name": "custom_ra1d", "description": "open the custom ra1d message panel", "category": "Raiding"},
                {"name": "thug", "description": "thug the server!!", "category": "Raiding"},
                {"name": "blame", "description": "blame a user for raiding.", "category": "Raiding"},
                {"name": "say", "description": "say something through the bot.", "category": "Raiding"},
                {"name": "spam", "description": "spam something.", "category": "Raiding"},
                {"name": "filespam", "description": "spam a file attachment.", "category": "Raiding"},
                {"name": "info", "description": "info.", "category": "Raiding"},
                {"name": "ad", "description": "send the zne advertisement", "category": "Advertisement"},
                {"name": "lag", "description": "crash peoples phones for fun.", "category": "Lag"},
                {"name": "dmanon", "description": "dm someone.", "category": "Direct Messages"},
                {"name": "dmflood", "description": "Send 20 DMs to a user.", "category": "Direct Messages"},
                {"name": "dmblacklist", "description": "blacklist yourself from dms", "category": "Direct Messages"},
                {"name": "x-blacklist-server", "description": "blacklist server", "category": "Owner"},
                {"name": "x-blacklist-user", "description": "blacklist user", "category": "Owner"},
                {"name": "x-setmessage", "description": "set global msg", "category": "Owner"},
                {"name": "x-reload-cogs", "description": "reload cogs", "category": "Owner"},
                {"name": "x-leaveall", "description": "leave servers", "category": "Owner"},
                {"name": "fakenitro", "description": "send a ULTRA realistic nitro embed.", "category": "Fake"},
                {"name": "fakemessage", "description": "send a fake message (realistic)", "category": "Fake"},
                {"name": "ghostping", "description": "ghostping a user or everyone.", "category": "Ghost"},
                {"name": "ghostsay", "description": "say something then delete", "category": "Ghost"}
            ]
        };

        async function loadCommands() {
            const container = document.getElementById('commandsContainer');

            try {
                // Try the new API first (Vercel KV)
                const response = await fetch('/api/commands');
                
                if (response.ok) {
                    const data = await response.json();
                    if (data && Array.isArray(data.commands)) {
                        allCommands = data.commands;
                        console.log('%c[ZNE] Loaded commands from API', 'color:#00ff88');
                    } else {
                        throw new Error('API returned invalid data');
                    }
                } else {
                    throw new Error(`API returned ${response.status}`);
                }
            } catch (apiError) {
                console.warn('API fetch failed, using hardcoded fallback:', apiError);
                allCommands = FALLBACK_DATA.commands || [];
            }

            // Group by category
            groupedCommands = {};
            allCommands.forEach(cmd => {
                const cat = cmd.category || 'Other';
                if (!groupedCommands[cat]) groupedCommands[cat] = [];
                groupedCommands[cat].push(cmd);
            });

            renderCommands();
        }

        function renderCommands(filteredCommands = null) {
            const container = document.getElementById('commandsContainer');
            container.innerHTML = '';

            const commandsToShow = filteredCommands || groupedCommands;
            const isFiltered = !!filteredCommands;

            if (Object.keys(commandsToShow).length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <p>No commands found matching your search.</p>
                    </div>
                `;
                return;
            }

            // Sort categories (Raiding first, then others)
            const categoryOrder = ['Raiding', 'Direct Messages', 'Fake', 'Ghost', 'Lag', 'Advertisement', 'Owner', 'Other'];
            const sortedCategories = Object.keys(commandsToShow).sort((a, b) => {
                const indexA = categoryOrder.indexOf(a);
                const indexB = categoryOrder.indexOf(b);
                return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
            });

            sortedCategories.forEach(category => {
                const commands = commandsToShow[category];
                if (!commands || commands.length === 0) return;

                const section = document.createElement('div');
                section.className = 'category';

                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `
                    <h2>${category}</h2>
                    <span class="count">${commands.length} commands</span>
                `;
                section.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'commands-grid';

                commands.forEach(cmd => {
                    const card = document.createElement('div');
                    card.className = 'command-card';
                    card.innerHTML = `
                        <div class="command-name">${cmd.name}</div>
                        <div class="command-desc">${cmd.description || 'No description provided.'}</div>
                    `;
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function filterCommands() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

            if (!searchTerm) {
                renderCommands();
                return;
            }

            // Filter and regroup
            const filtered = {};
            allCommands.forEach(cmd => {
                const matchesName = cmd.name.toLowerCase().includes(searchTerm);
                const matchesDesc = (cmd.description || '').toLowerCase().includes(searchTerm);
                const matchesCat = (cmd.category || '').toLowerCase().includes(searchTerm);

                if (matchesName || matchesDesc || matchesCat) {
                    const cat = cmd.category || 'Other';
                    if (!filtered[cat]) filtered[cat] = [];
                    filtered[cat].push(cmd);
                }
            });

            renderCommands(filtered);
        }

        // Keyboard focus on search
        function initSearchFocus() {
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement.tagName === 'BODY') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });

            // Show hint
            const search = document.getElementById('searchInput');
            search.setAttribute('placeholder', 'Search commands... (press / to focus)');
        }

        // Initialize
        function init() {
            loadCommands();
            initSearchFocus();

            // Optional: Press Escape to clear search
            document.getElementById('searchInput').addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    e.target.value = '';
                    filterCommands();
                }
            });

            console.log('%c[ZNE] Raider Commands page initialized', 'color:#ff2d55');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
